<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Seyf — namuna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#080B12;--sf:#121826;--sf2:#1A2133;--inset:#0E1320;
    --tx:#ECEEF3;--tx2:#9AA3B8;--tx3:#646C80;--lblg:#B89B6A;
    --gold:#C9A96E;--goldl:#E8D7B8;--goldd:#A0793C;
    --ln:rgba(201,169,110,.16);--ln2:rgba(201,169,110,.34);
    --info:#C9A96E;--infobg:rgba(201,169,110,.15);
    --gr:#5BD68B;--grbg:rgba(91,214,139,.13);--rd:#F2807A;--rdbg:rgba(242,128,122,.13);
    --bl:#7FB6FF;--blbg:rgba(127,182,255,.13);--am:#E5C76B;--ambg:rgba(229,199,107,.13);
    --serif:'Cormorant Garamond',Georgia,serif;--mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
    --num:'Inter',-apple-system,'Segoe UI',Roboto,system-ui,sans-serif}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:
      radial-gradient(120% 50% at 50% -8%,rgba(201,169,110,.10),transparent 60%),
      var(--bg);color:var(--tx);font-family:Inter,-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
    font-size:14px;line-height:1.5;padding:0;display:flex;justify-content:center;min-height:100vh;min-height:100dvh}
  #seyf{width:100%;max-width:480px;height:100vh;height:100dvh;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#0F1422,#0B0F1A);overflow:hidden;box-shadow:0 0 50px rgba(0,0,0,.5)}
  #loginScr{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;overflow-y:auto;-webkit-overflow-scrolling:touch}
  #appScr{flex:1;min-height:0;flex-direction:column}
  .hd{display:flex;align-items:center;gap:10px;padding:15px 16px;border-bottom:1px solid var(--ln);
    background:linear-gradient(180deg,rgba(201,169,110,.06),transparent)}
  .hd .t{font-family:var(--serif);font-weight:600;font-size:22px;letter-spacing:.5px;color:var(--goldl)}
  .chip{font-size:11px;padding:4px 11px;border-radius:999px;background:var(--infobg);color:var(--goldl);border:1px solid var(--ln)}
  .view{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
  .nav{display:flex;border-top:1px solid var(--ln);background:rgba(0,0,0,.2)}
  .nav button{flex:1;background:none;border:0;padding:11px 4px;font-size:11px;color:var(--tx3);
    display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:inherit}
  .nav button.on{color:var(--gold)}
  .nav svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7}
  .nav-ai{overflow:visible}
  .nav-ai-btn{width:50px;height:50px;border-radius:50%;background:linear-gradient(180deg,#EBD191,#C9A96E);
    display:flex;align-items:center;justify-content:center;margin:-20px auto 0;
    box-shadow:0 7px 18px rgba(201,169,110,.45),0 0 0 4px #0B0F1A;transition:transform .15s,box-shadow .2s}
  .nav-ai-btn svg{width:24px;height:24px;stroke:#241803;stroke-width:1.9}
  .nav-ai:active .nav-ai-btn{transform:scale(.93)}
  .nav-ai.on .nav-ai-btn{box-shadow:0 7px 18px rgba(201,169,110,.5),0 0 0 4px #0B0F1A,0 0 0 6px rgba(201,169,110,.4)}
  .sl{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--lblg);margin:20px 0 9px;
    display:flex;align-items:center;gap:9px}
  .sl::after{content:"";flex:1;height:1px;background:var(--ln)}
  .mc{background:var(--sf2);border:1px solid var(--ln);border-radius:14px;padding:13px 14px;position:relative;overflow:hidden}
  .mc::before{content:"";position:absolute;left:0;top:0;height:2px;width:100%;background:linear-gradient(90deg,var(--goldd),var(--gold),transparent)}
  .mc .l{font-size:11.5px;color:var(--tx2);letter-spacing:.3px}
  .mc .v{font-family:var(--num);font-weight:600;font-size:26px;margin-top:6px;color:var(--goldl);
    letter-spacing:-.2px;line-height:1.05;white-space:nowrap;font-variant-numeric:tabular-nums}
  .pc{display:flex;align-items:center;gap:11px;padding:13px;border:1px solid var(--ln);border-radius:13px;
    margin-bottom:9px;cursor:pointer;background:linear-gradient(180deg,rgba(255,255,255,.015),transparent)}
  .pc:active{border-color:var(--ln2)}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 9px 0 currentColor}
  .lg{width:42px;height:42px;border-radius:12px;flex:0 0 auto;background:#fff;border:1px solid var(--ln2);
    display:flex;align-items:center;justify-content:center;overflow:hidden}
  .lg img{width:100%;height:100%;object-fit:contain;padding:4px}
  .lgd{width:42px;height:42px;border-radius:12px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    border:1px solid var(--ln);background:var(--inset)}
  .lgd .d{width:14px;height:14px;border-radius:50%}
  .pgrid{display:grid;gap:11px;margin-bottom:4px}
  .pcard{display:flex;align-items:center;gap:13px;border:1px solid var(--ln);border-radius:15px;padding:13px 15px;cursor:pointer;
    position:relative;overflow:hidden;min-width:0;background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,0))}
  .pcard::before{content:"";position:absolute;left:0;top:0;height:100%;width:3px;background:var(--pcol,var(--gold));opacity:.85}
  .pcard:active{border-color:var(--ln2)}
  .pcard .lgb{width:52px;height:52px;border-radius:13px;background:#fff;border:1px solid var(--ln2);flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;overflow:hidden}
  .pcard .lgb img{width:100%;height:100%;object-fit:contain;padding:5px}
  .pcard .lgbd{width:52px;height:52px;border-radius:13px;border:1px solid var(--ln);background:var(--inset);flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  .pcard .pc-mid{flex:1;min-width:0}
  .pcard .nm{font-weight:500;font-size:15px}
  .pcard .pc-bal{text-align:right;flex:0 0 auto}
  .pcard .b1{font-family:var(--num);font-weight:600;font-size:18px;color:var(--goldl);
    letter-spacing:-.2px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .pcard .b2{font-family:var(--num);font-size:13px;color:var(--tx3);margin-top:3px;white-space:nowrap}
  .pc .nm{font-weight:500}
  .pc .bal{margin-left:auto;text-align:right;font-family:var(--num);font-size:14px;color:var(--tx)}
  .op{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--ln)}
  .bdg{font-size:10.5px;padding:3px 9px;border-radius:7px;white-space:nowrap;font-weight:600;letter-spacing:.2px;border:1px solid transparent}
  .amt{margin-left:auto;font-family:var(--num);font-weight:600;white-space:nowrap;font-size:15.5px}
  .seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:15px}
  .seg button{padding:13px;border:1px solid var(--ln);background:var(--inset);border-radius:12px;font-weight:500;
    font-size:13px;cursor:pointer;color:var(--tx2);font-family:inherit}
  .seg button.on{border-color:var(--gold);background:var(--infobg);color:var(--goldl)}
  label.fl{display:block;font-size:11.5px;color:var(--tx2);letter-spacing:.3px;margin:13px 0 6px}
  input,select{width:100%;padding:12px 13px;border:1px solid var(--ln2);border-radius:12px;font-size:16px;
    font-family:inherit;background:var(--inset);color:var(--tx)}
  input:focus,select:focus{outline:0;border-color:var(--gold)}
  input::placeholder{color:var(--tx3)}
  .amtwrap{position:relative}
  .amtpre{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--goldl);font-weight:600;
    font-family:var(--num);font-size:16px;pointer-events:none;display:none}
  .amtsuf{position:absolute;right:15px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px;pointer-events:none}
  .amteq{margin-top:8px;font-size:12.5px;color:var(--lblg);font-family:var(--num);min-height:16px}
  #rateRow{margin-top:6px}
  .pbtn{width:100%;padding:14px;border:0;border-radius:12px;
    background:linear-gradient(180deg,#E2C684,#C9A96E);color:#241803;font-size:15px;font-weight:600;
    letter-spacing:.3px;cursor:pointer;font-family:inherit;margin-top:18px;box-shadow:0 8px 22px rgba(201,169,110,.22)}
  .gbtn{padding:7px 11px;border:1px solid var(--ln2);background:var(--inset);border-radius:10px;font-size:17px;
    cursor:pointer;font-family:inherit;color:var(--goldl);line-height:1}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .led{display:flex;align-items:center;gap:9px;padding:11px 0;border-bottom:1px solid var(--ln);font-size:13px}
  .led .rb{margin-left:auto;font-family:var(--num);text-align:right}
  .bi{background:var(--grbg);color:var(--gr);border-color:rgba(91,214,139,.25)}
  .be{background:var(--rdbg);color:var(--rd);border-color:rgba(242,128,122,.25)}
  .bx{background:var(--blbg);color:var(--bl);border-color:rgba(127,182,255,.25)}
  .bt{background:var(--ambg);color:var(--am);border-color:rgba(229,199,107,.25)}
  .muted{color:var(--tx3)} .gr{color:var(--gr)} .rd{color:var(--rd)} .am{color:var(--am)}
  .dv-row{display:flex;align-items:center;gap:9px;margin:11px 0}
  .dv-name{width:80px;flex:0 0 auto;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx)}
  .dv-track{flex:1;height:20px;position:relative;border-radius:5px;background:rgba(255,255,255,.03);overflow:hidden}
  .dv-mid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.15)}
  .dv-fill{position:absolute;top:3px;bottom:3px;border-radius:4px;min-width:2px}
  .dv-amt{width:96px;flex:0 0 auto;text-align:right;font-family:var(--num);font-size:11.5px;line-height:1.2}
  .dl-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--ln);font-size:13px}
  .dl-arrow{color:var(--am);font-weight:600}
  .dl-amt{margin-left:auto;font-family:var(--num);font-weight:600;color:var(--am);white-space:nowrap;font-size:12.5px}
  .dq-legend{font-size:11px;color:var(--tx2);margin:0 0 13px;line-height:1.6}
  .dq-legend .g{color:var(--gr);font-size:13px} .dq-legend .r{color:var(--rd);font-size:13px}
  .dq-stat{padding:11px 13px;border:1px solid var(--ln);border-left-width:3px;border-radius:12px;margin-bottom:9px;
    background:linear-gradient(180deg,rgba(255,255,255,.015),transparent)}
  .dq-stat-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .dq-stat-name{font-weight:500;font-size:14px}
  .dq-stat-net{font-family:var(--num);font-weight:600;font-size:15px;white-space:nowrap}
  .dq-bar{height:7px;border-radius:4px;background:rgba(255,255,255,.05);margin-top:9px;overflow:hidden}
  .dq-bar i{display:block;height:100%;border-radius:4px}
  .dq-tag{font-size:11px;margin-top:7px}
  .dq-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--ln)}
  .dq-pair{display:flex;align-items:center;gap:7px;font-size:14px}
  .dq-b{font-weight:600;color:var(--rd)} .dq-l{font-weight:500;color:var(--goldl)}
  .dq-arrow{color:var(--tx3);flex:0 0 auto}
  .dq-sub{font-size:11.5px;color:var(--tx3);margin-top:3px}
  .dq-amt{margin-left:auto;font-family:var(--num);font-weight:600;color:var(--tx);white-space:nowrap;font-size:12.5px;text-align:right;flex:0 0 auto}
  .chbox{background:var(--sf);border:1px solid var(--ln);border-radius:14px;padding:13px 14px 10px;margin-bottom:12px}
  .chttl{font-size:11px;color:var(--lblg);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
  .chwrap{position:relative;width:100%}
  .donut-c{position:absolute;top:42%;left:0;right:0;transform:translateY(-50%);text-align:center;pointer-events:none}
  .donut-c .v{font-family:var(--num);font-weight:600;font-size:22px;color:var(--goldl)}
  .donut-c .l{font-size:10.5px;color:var(--tx3);margin-top:2px}
  .debt-card{border:1px solid var(--ln);border-radius:13px;padding:12px 13px;margin-bottom:9px;cursor:pointer;
    background:linear-gradient(180deg,rgba(255,255,255,.015),transparent)}
  .debt-card:active{border-color:var(--ln2)}
  .debt-card.done{opacity:.65}
  .debt-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .debt-rem{font-family:var(--num);font-weight:600;color:var(--am);white-space:nowrap;font-size:16px}
  .debt-pbar{height:6px;border-radius:4px;background:rgba(255,255,255,.07);margin:9px 0 7px;overflow:hidden}
  .debt-pbar i{display:block;height:100%;background:var(--gr);border-radius:4px}
  .debt-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11px;color:var(--tx3)}
  .debt-paid{color:var(--gr)} .debt-done-b{font-size:11px;color:var(--gr);font-weight:600}
  .dd-parties{display:flex;align-items:center;justify-content:center;gap:14px;margin:4px 0 16px}
  .dd-side{text-align:center}.dd-side .nm{font-weight:600;font-size:15px}.dd-side .rl{font-size:11px;margin-top:2px}
  .dd-arrow{color:var(--tx3);flex:0 0 auto}
  .dd-stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
  .dd-stat3 .b{background:var(--sf2);border:1px solid var(--ln);border-radius:11px;padding:10px 8px;text-align:center}
  .dd-stat3 .l{font-size:10px;color:var(--tx3)}.dd-stat3 .v{font-family:var(--num);font-weight:600;font-size:16px;margin-top:4px}
  .pay-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--ln);font-size:13px}
  .pay-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);flex:0 0 auto}
  .pay-amt{margin-left:auto;font-family:var(--num);font-weight:600;color:var(--gr);white-space:nowrap}
  .payform{display:flex;gap:8px}.payform input{flex:1}
  .paybtn{padding:0 18px;border:0;border-radius:11px;background:linear-gradient(180deg,#E2C684,#C9A96E);
    color:#241803;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;font-size:14px}
  .rel-box{margin-top:11px;background:var(--sf2);border:1px solid var(--ln);border-radius:11px;padding:11px 13px}
  .rel-box.muted{color:var(--tx3);font-size:12.5px}
  .rel-t{font-size:10.5px;color:var(--lblg);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
  .rel-row{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:3px 0}
  .rel-amt{font-family:var(--num);font-weight:600;color:var(--am);white-space:nowrap}
  .ai-wrap{text-align:center;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0}
  .ai-orb{position:relative;width:160px;height:160px;margin:6px auto 12px;cursor:pointer}
  .ai-orb .core{position:absolute;inset:46px;border-radius:50%;z-index:2;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 38% 30%,#F4E2B4,var(--gold) 55%,var(--goldd));
    box-shadow:0 10px 28px rgba(201,169,110,.5),inset 0 2px 5px rgba(255,255,255,.6),inset 0 -5px 10px rgba(70,46,16,.6)}
  .ai-orb .core svg{width:38px;height:38px;stroke:#241803;stroke-width:1.8;fill:none}
  .ai-ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(201,169,110,.45);opacity:0}
  .ai-orb.live .ring1{animation:aiPulse 1.9s ease-out infinite}
  .ai-orb.live .ring2{animation:aiPulse 1.9s ease-out .65s infinite}
  .ai-orb.live .ring3{animation:aiPulse 1.9s ease-out 1.3s infinite}
  @keyframes aiPulse{0%{transform:scale(.5);opacity:.7}100%{transform:scale(1.05);opacity:0}}
  .ai-status{font-size:13px;color:var(--tx2);margin:2px 0 14px;min-height:18px}
  .ai-chip{display:inline-block;font-size:12.5px;padding:9px 14px;margin:5px 4px;border-radius:999px;
    border:1px solid var(--ln2);background:var(--inset);color:var(--goldl);cursor:pointer}
  .ai-ans{margin-top:16px;text-align:left;background:var(--sf2);border:1px solid var(--ln);border-radius:12px;
    padding:13px 15px;font-size:13.5px;line-height:1.55;color:var(--tx)}
  .ai-q{font-size:12px;color:var(--lblg);margin-bottom:6px}
  @media (prefers-reduced-motion:reduce){.ai-orb.live .ai-ring{animation:none}}
  /* ===== Premium polish ===== */
  #seyf{background:radial-gradient(120% 55% at 50% -6%,rgba(201,169,110,.11),transparent 55%),linear-gradient(180deg,#10141F,#0A0E17 72%);
    box-shadow:0 0 60px rgba(0,0,0,.55),inset 0 0 0 1px rgba(201,169,110,.05)}
  .hd{position:relative;background:linear-gradient(180deg,rgba(201,169,110,.07),transparent)}
  .hd::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,169,110,.55),transparent)}
  .mc{background:linear-gradient(180deg,rgba(201,169,110,.08),rgba(255,255,255,.012) 32%,transparent);
    border:1px solid rgba(201,169,110,.18);box-shadow:0 8px 22px -10px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.05)}
  .mc .l{text-transform:uppercase;letter-spacing:.7px;font-size:10px;color:var(--lblg)}
  .pcard,.chbox,.debt-card,.dd-stat3 .b,.dq-stat,.rel-box{border:1px solid rgba(201,169,110,.15);
    box-shadow:0 8px 22px -12px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04)}
  .pcard{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,0))}
  .sl{letter-spacing:1.6px;font-size:10.5px}
  .sl::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 7px var(--gold);flex:0 0 auto}
  .nav{background:rgba(9,13,21,.8);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-top:1px solid rgba(201,169,110,.2)}
  .nav button.on:not(.nav-ai)::before{content:"";position:absolute;top:4px;width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 7px var(--gold)}
  .nav button{position:relative}
  .pbtn{position:relative;overflow:hidden}
  .pbtn::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 36%,rgba(255,255,255,.45),transparent 64%);transform:translateX(-130%)}
  .pbtn:hover::after,.pbtn:active::after{transform:translateX(130%);transition:transform .7s ease}
  .view::-webkit-scrollbar{width:7px}
  .view::-webkit-scrollbar-thumb{background:rgba(201,169,110,.32);border-radius:8px}
  .view::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="seyf">
  <div id="loginScr">
<style>
.vx-wrap{--g1:#fff4cf;--g:#f6d98a;--g2:#caa24e;--g3:#8a6a26;--g4:#5a4418;--gh:#fff7da;--st1:#e9edf2;--st2:#3c424b;--ob1:#23262e;--ob2:#0b0c10;position:relative;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:460px;margin:0 auto;padding:18px 14px 26px;box-sizing:border-box;font-family:'Inter',sans-serif;color:#e9ddc4;text-align:center;isolation:isolate;border-radius:24px;overflow:hidden;-webkit-tap-highlight-color:transparent;
 --noise:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='120' height='120' filter='url(%23n)'/></svg>")}

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
(function(){
  var P=[
    {code:'impulse',name:'Impulse',color:'#D9A441',logo:'seyf-logos/impulse.jpg',UZS:620000000,USD:31500},
    {code:'jalinga',name:'Jalinga',color:'#43C99B',logo:'seyf-logos/jalinga.jpg',UZS:214000000,USD:28900},
    {code:'mfaktor_school',name:'Mfaktor maktab',color:'#5EA0F0',logo:'seyf-logos/mfaktor_school.jpg',UZS:268500000,USD:14000},
    {code:'mfaktor_club',name:'Mfaktor club',color:'#A78BFA',logo:'seyf-logos/mfaktor_club.png',UZS:98000000,USD:7200},
    {code:'mlp',name:'My Life Planner',color:'#EC6FA0',logo:'',UZS:40000000,USD:4800}
  ];
  var OPS=[
    {type:'income',proj:'mfaktor_school',cur:'UZS',amt:18000000,cat:"Mijoz to'lovi",note:'Trening to\'lovi',date:'bugun 14:20'},
    {type:'expense',proj:'impulse',cur:'UZS',amt:25000000,cat:'Ijara',note:'Iyun ijara',date:'bugun 12:05'},
    {type:'transfer',proj:'impulse',counter:'mfaktor_club',cur:'UZS',amt:30000000,loan:true,note:'Tadbir uchun',date:'bugun 09:48'},
    {type:'transfer',proj:'jalinga',counter:'mfaktor_school',cur:'UZS',amt:50000000,loan:true,note:'Jihoz xaridi',date:'15.06 11:00'},
    {type:'transfer',proj:'impulse',counter:'mlp',cur:'USD',amt:5000,loan:true,note:'Boshlang\'ich kapital',date:'12.06 16:30'},
    {type:'transfer',proj:'mfaktor_club',counter:'jalinga',cur:'UZS',amt:12000000,loan:true,note:'Reklama',date:'08.06 10:15'}
  ];
  // Qarzlar — to'liq model: original summa + to'lovlar tarixi (qisman to'lash)
  var DEBTS=[
    {id:1,lender:'impulse',borrower:'mfaktor_club',cur:'UZS',amount:30000000,note:'Tadbir uchun',date:'bugun 09:48',pays:[]},
    {id:2,lender:'jalinga',borrower:'mfaktor_school',cur:'UZS',amount:50000000,note:'Jihoz xaridi',date:'15.06 11:00',pays:[{amt:20000000,date:'18.06 10:00'}]},
    {id:3,lender:'impulse',borrower:'mlp',cur:'USD',amount:5000,note:'Boshlang\'ich kapital',date:'12.06 16:30',pays:[{amt:2000,date:'17.06 12:00'}]},
    {id:4,lender:'mfaktor_club',borrower:'jalinga',cur:'UZS',amount:12000000,note:'Reklama',date:'08.06 10:15',pays:[]}
  ];
  var debtSeq=5;
  function dPaid(d){var s=0;(d.pays||[]).forEach(function(p){s+=p.amt;});return s;}
  function dRem(d){return Math.max(0,d.amount-dPaid(d));}
  function dDone(d){return dRem(d)<=0;}
  var ROLES={'1234':{role:'director'},'1111':{role:'cashier'},
    '2001':{role:'owner',sc:'jalinga'},'2002':{role:'owner',sc:'mfaktor_school'},
    '2003':{role:'owner',sc:'mfaktor_club'},'2004':{role:'owner',sc:'mlp'}};
  var ROLE_UZ={director:'Direktor',cashier:'Kassir',owner:'Loyiha egasi'};
  var BCLS={income:'bi',expense:'be',exchange:'bx',transfer:'bt'};
  var LAB={income:'Kirim',expense:'Chiqim',exchange:'Ayirboshlash',transfer:"Qarz"};
  var st={role:null,sc:null,view:'dash',curProj:null,newType:'income'};
  var $=function(id){return document.getElementById(id);};
  function grp(n){n=Math.round(n);var s=Math.abs(n).toLocaleString('en-US').replace(/,/g,' ');return (n<0?'−':'')+s;}
  function fmt(cur,n){return cur==='USD'?('$'+grp(n)):(grp(n)+" so'm");}
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function P_(c){for(var i=0;i<P.length;i++)if(P[i].code===c)return P[i];return null;}
  function visible(){return st.role==='owner'?P.filter(function(p){return p.code===st.sc;}):P.slice();}
  function canWrite(){return st.role==='director'||st.role==='cashier';}
  function opVisible(o){if(st.role!=='owner')return true;return o.proj===st.sc||o.counter===st.sc;}
  window.seyfLogin=function(){
    var c=($('codeIn').value||'').trim();var r=ROLES[c];
    if(!r){$('loginErr').textContent='Kod noto\'g\'ri';return;}
    st.role=r.role;st.sc=r.sc||null;st.view='dash';
    $('loginScr').style.display='none';$('appScr').style.display='flex';
    $('roleChip').textContent=ROLE_UZ[st.role];
    $('nav-new').style.display=canWrite()?'flex':'none';seyfGo('dash');};
  window.seyfTurn=function(el){
    var code=((document.getElementById('codeIn')||{}).value||'').trim();
    if(!ROLES[code]){seyfLogin();return;}
    var sc=document.getElementById('loginScr');
    if(sc){sc.classList.remove('is-opening');void sc.offsetWidth;sc.classList.add('is-opening');}
    if(el)el.classList.add('is-opening');
    clearTimeout(window._turnT);
    window._turnT=setTimeout(function(){
      if(sc)sc.classList.remove('is-opening');if(el)el.classList.remove('is-opening');
      seyfLogin();
    },700);
  };
  window.seyfGo=function(v){st.view=v;render();};
  window.seyfBack=function(){seyfGo(st.view==='debtDetail'?'debts':'dash');};
  function setNav(){var av=(st.view==='debtDetail')?'debts':st.view;['dash','debts','ai','ops','new'].forEach(function(v){var b=$('nav-'+v);if(b)b.classList.toggle('on',av===v);});}
  function render(){
    var v=st.view;$('backBtn').style.display=(v==='project'||v==='new'||v==='debtDetail')?'block':'none';
    $('hdTitle').textContent={dash:'Panel',ops:'Amallar',new:'Yangi amal',debts:'Loyihalararo qarzlar',debtDetail:'Qarz tafsiloti',ai:'Seyf AI',project:(P_(st.curProj)||{}).name||'Loyiha'}[v]||'Seyf';
    setNav();
    if(v==='dash')renderDash();else if(v==='ops')renderOps();else if(v==='new')renderNew();
    else if(v==='project')renderProject();else if(v==='debts')renderDebts();else if(v==='debtDetail')renderDebtDetail(st.curDebt);else if(v==='ai')renderAI();}
  function renderDash(){
    var vis=visible();var tu=0,td=0;vis.forEach(function(p){tu+=p.UZS;td+=p.USD;});
    var h='<div class="row2" style="margin-bottom:6px"><div class="mc"><div class="l">Jami — so\'m</div><div class="v">'+grp(tu)+'</div></div>'+
      '<div class="mc"><div class="l">Jami — dollar</div><div class="v">$'+grp(td)+'</div></div></div>';
    h+='<div class="sl">Loyihalar</div>';
    h+='<div class="pgrid" style="grid-template-columns:minmax(0,1fr)">';
    vis.forEach(function(p){
      var chip=p.logo?('<span class="lgb"><img src="'+p.logo+'" alt=""></span>')
        :('<span class="lgbd"><span class="d" style="width:18px;height:18px;border-radius:50%;background:'+p.color+';box-shadow:0 0 11px '+p.color+'"></span></span>');
      h+='<div class="pcard" style="--pcol:'+p.color+'" onclick="seyfProj(\''+p.code+'\')">'+chip+
        '<div class="pc-mid"><div class="nm">'+esc(p.name)+'</div></div>'+
        '<div class="pc-bal"><div class="b1">'+grp(p.UZS)+'</div><div class="b2">$'+grp(p.USD)+'</div></div></div>';});
    h+='</div>';
    if(canWrite())h+='<button class="pbtn" onclick="seyfGo(\'new\')" style="margin-top:8px">+ Yangi amal</button>';
    h+='<div class="sl">So\'nggi amallar</div>';
    var rec=OPS.filter(opVisible).slice(0,8);
    if(!rec.length)h+='<div class="muted" style="padding:14px 0">Amal yo\'q</div>';
    rec.forEach(function(o){h+=opRow(o);});$('view').innerHTML=h;}
  function opRow(o){
    var sign=o.type==='income'?'+':(o.type==='expense'?'−':'');
    var amtTxt=o.type==='exchange'?('−'+fmt(o.sellCur,o.sellAmt)+' → +'+fmt(o.buyCur,o.buyAmt)):(sign+fmt(o.cur,o.amt));
    var sub=(P_(o.proj)||{}).name||'';if(o.counter)sub+=' → '+((P_(o.counter)||{}).name||'');if(o.cat)sub+=' · '+o.cat;
    var cl=o.type==='income'?'gr':(o.type==='expense'?'rd':'');
    return '<div class="op"><span class="bdg '+BCLS[o.type]+'">'+LAB[o.type]+'</span>'+
      '<div style="min-width:0"><div>'+esc(o.note||o.cat||sub)+(o.loan?' <span class="am" style="font-size:10px">qarz</span>':'')+'</div>'+
      '<div style="font-size:11.5px" class="muted">'+esc(sub)+' · '+esc(o.date)+'</div></div>'+
      '<span class="amt '+cl+'">'+amtTxt+'</span></div>';}
  function renderOps(){
    var h='<div style="display:flex;gap:7px;margin-bottom:14px">';
    ['Kunlik','Haftalik','Oylik','Choraklik'].forEach(function(x,i){h+='<span style="font-size:11.5px;padding:6px 11px;border-radius:9px;border:1px solid var(--ln2);'+
      (i===2?'background:var(--infobg);color:var(--goldl)':'color:var(--tx2)')+'">'+x+'</span>';});h+='</div>';
    var list=OPS.filter(opVisible);if(!list.length)h+='<div class="muted" style="padding:20px 0;text-align:center">Amal yo\'q</div>';
    list.forEach(function(o){h+=opRow(o);});$('view').innerHTML=h;}
  function renderProject(){
    var p=P_(st.curProj);if(!p){seyfGo('dash');return;}
    var pchip=p.logo?('<span class="lg"><img src="'+p.logo+'" alt=""></span>')
      :('<span class="lgd"><span class="d" style="background:'+p.color+';box-shadow:0 0 9px '+p.color+'"></span></span>');
    var h='<div style="display:flex;align-items:center;gap:11px;margin-bottom:14px">'+pchip+
      '<span style="font-family:var(--serif);font-size:21px;color:var(--goldl)">'+esc(p.name)+'</span></div>';
    h+='<div class="row2" style="margin-bottom:4px"><div class="mc"><div class="l">so\'m</div><div class="v">'+grp(p.UZS)+'</div></div>'+
      '<div class="mc"><div class="l">dollar</div><div class="v">$'+grp(p.USD)+'</div></div></div>';
    if(canWrite())h+='<div class="row2" style="margin:12px 0 4px">'+
      '<button onclick="seyfAdd(\'income\')" style="padding:12px;border:1px solid rgba(91,214,139,.4);background:var(--grbg);color:var(--gr);border-radius:12px;font-weight:600;font-family:inherit;font-size:14px;cursor:pointer">+ Kirim</button>'+
      '<button onclick="seyfAdd(\'expense\')" style="padding:12px;border:1px solid rgba(242,128,122,.4);background:var(--rdbg);color:var(--rd);border-radius:12px;font-weight:600;font-family:inherit;font-size:14px;cursor:pointer">− Chiqim</button></div>';
    ['UZS','USD'].forEach(function(cur){
      h+='<div class="sl">'+(cur==='UZS'?'So\'m':'Dollar')+' daftari</div>';
      var run=p[cur];var rows=OPS.filter(function(o){return opTouches(o,p.code,cur);});
      if(!rows.length){h+='<div class="muted" style="padding:6px 0;font-size:13px">Yozuv yo\'q</div>';return;}
      rows.forEach(function(o){var d=delta(o,p.code,cur);
        h+='<div class="led"><span>'+LAB[o.type]+'</span><span class="muted" style="font-size:12px">'+esc(o.note||o.cat||'')+'</span>'+
          '<span class="rb"><span class="'+(d>=0?'gr':'rd')+'">'+(d>=0?'+':'−')+fmt(cur,Math.abs(d))+'</span>'+
          '<br><span class="muted" style="font-size:12px">'+fmt(cur,run)+'</span></span></div>';run-=d;});});
    $('view').innerHTML=h;}
  function opTouches(o,code,cur){
    if(o.type==='exchange')return o.proj===code&&(o.sellCur===cur||o.buyCur===cur);
    if(o.type==='transfer')return o.cur===cur&&(o.proj===code||o.counter===code);
    return o.proj===code&&o.cur===cur;}
  function delta(o,code,cur){
    if(o.type==='income')return o.amt;if(o.type==='expense')return -o.amt;
    if(o.type==='transfer')return o.proj===code?-o.amt:o.amt;
    if(o.type==='exchange')return o.sellCur===cur?-o.sellAmt:o.buyAmt;return 0;}
  window.seyfProj=function(c){st.curProj=c;seyfGo('project');};
  window.seyfType=function(t){st.newType=t;renderNew();};
  window.seyfAdd=function(t){st.newType=t;st.newProj=st.curProj;seyfGo('new');};
  function projOpts(sel){return P.map(function(p){return '<option value="'+p.code+'"'+(p.code===sel?' selected':'')+'>'+esc(p.name)+'</option>';}).join('');}
  function curOpts(sel){return ['UZS','USD'].map(function(c){return '<option value="'+c+'"'+(c===sel?' selected':'')+'>'+(c==='UZS'?'so\'m':'dollar')+'</option>';}).join('');}
  function renderNew(){
    var t=st.newType;var preProj=st.newProj;st.newProj=null;var h='<div class="seg">';
    ['income','expense','exchange','transfer'].forEach(function(x){h+='<button class="'+(x===t?'on':'')+'" onclick="seyfType(\''+x+'\')">'+LAB[x]+'</button>';});h+='</div>';
    if(t==='transfer'){h+='<label class="fl">Qarz beruvchi loyiha (pul berdi)</label><select id="f_from" onchange="seyfLoanRel()">'+projOpts('impulse')+'</select>';
      h+='<label class="fl">Qarz oluvchi loyiha (qarzdor)</label><select id="f_to" onchange="seyfLoanRel()">'+projOpts('mfaktor_club')+'</select>';
      h+='<div id="loanRel"></div>';}
    else{h+='<label class="fl">Loyiha</label><select id="f_proj">'+projOpts(preProj||'impulse')+'</select>';}
    if(t==='exchange'){
      h+='<div class="row2"><div><label class="fl">Sotiladi</label><select id="f_sc">'+curOpts('USD')+'</select></div>'+
         '<div><label class="fl">Miqdor</label><input id="f_sa" inputmode="decimal" placeholder="0" oninput="seyfGrp(this)"></div></div>';
      h+='<div class="row2"><div><label class="fl">Olinadi</label><select id="f_bc">'+curOpts('UZS')+'</select></div>'+
         '<div><label class="fl">Miqdor</label><input id="f_ba" inputmode="decimal" placeholder="0" oninput="seyfGrp(this)"></div></div>';}
    else{h+='<label class="fl">Valyuta</label><select id="f_cur" onchange="seyfCur()">'+curOpts('UZS')+'</select>';
      h+='<label class="fl">Summa</label>'+
         '<div class="amtwrap"><span class="amtpre" id="amtPre">$</span><span class="amtsuf" id="amtSuf">so\'m</span>'+
         '<input id="f_amt" inputmode="decimal" placeholder="0" oninput="seyfGrp(this);seyfEq()"></div>'+
         '<div id="rateRow" style="display:none"><label class="fl">Kurs — 1$ necha so\'m?</label>'+
         '<input id="f_rate" inputmode="decimal" placeholder="12 850" oninput="seyfGrp(this);seyfEq()">'+
         '<div class="amteq" id="amtEq"></div></div>';}
    if(t==='income'||t==='expense'){var cats=t==='income'?["Mijoz to'lovi","Avans","Ijara tushumi","Boshqa kirim"]:["Oylik / ish haqi","Ijara","Marketing","Ta'minot / xarid","Boshqa chiqim"];
      h+='<label class="fl">Modda</label><select id="f_cat">'+cats.map(function(c){return '<option>'+esc(c)+'</option>';}).join('')+'</select>';}
    if(t==='transfer')h+='<div style="font-size:11.5px;color:var(--lblg);margin:10px 0 2px;display:flex;gap:7px;align-items:center"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="flex:0 0 auto"><path d="M5 12h14M13 6l6 6-6 6"/></svg>Qarz oluvchi loyiha beruvchiga qarzdor bo\'lib qoladi — «Qarzlar» bo\'limida ko\'rinadi.</div>';
    h+='<label class="fl">Izoh</label><input id="f_note" placeholder="ixtiyoriy">';
    h+='<button class="pbtn" onclick="seyfSave()">Saqlash — '+LAB[t]+'</button>';$('view').innerHTML=h;seyfCur();if(t==='transfer')seyfLoanRel();}
  window.seyfLoanRel=function(){
    var box=$('loanRel');if(!box)return;
    var a=($('f_from')||{}).value,b=($('f_to')||{}).value;
    if(!a||!b||a===b){box.innerHTML='';return;}
    var rel=DEBTS.filter(function(d){return dRem(d)>0&&((d.lender===a&&d.borrower===b)||(d.lender===b&&d.borrower===a));});
    if(!rel.length){box.innerHTML='<div class="rel-box muted">Bu ikki loyiha o\'rtasida hozir ochiq qarz yo\'q.</div>';return;}
    var html='<div class="rel-box"><div class="rel-t">Mavjud o\'zaro qarzlar (qoldiq)</div>';
    rel.forEach(function(d){var bb=(P_(d.borrower)||{}).name||d.borrower,ll=(P_(d.lender)||{}).name||d.lender;
      html+='<div class="rel-row"><span><b style="color:var(--rd)">'+esc(bb)+'</b> → '+esc(ll)+'</span><span class="rel-amt">'+fmt(d.cur,dRem(d))+'</span></div>';});
    html+='</div>';box.innerHTML=html;
  };
  window.seyfCur=function(){
    var sel=$('f_cur');if(!sel)return;var usd=sel.value==='USD';
    var pre=$('amtPre'),suf=$('amtSuf'),inp=$('f_amt'),rr=$('rateRow');
    if(pre)pre.style.display=usd?'block':'none';
    if(suf)suf.style.display=usd?'none':'block';
    if(inp){inp.style.paddingLeft=usd?'28px':'13px';inp.style.paddingRight=usd?'13px':'54px';}
    if(rr)rr.style.display=usd?'block':'none';
    seyfEq();};
  window.seyfEq=function(){
    var eq=$('amtEq');if(!eq)return;var sel=$('f_cur');
    if(!sel||sel.value!=='USD'){eq.textContent='';return;}
    var a=parseFloat(($('f_amt').value||'').replace(/ /g,''))||0;
    var r=parseFloat((($('f_rate')||{}).value||'').replace(/ /g,''))||0;
    eq.textContent=(a>0&&r>0)?('≈ '+grp(a*r)+" so'm"):'';};

  function renderDebts(){
    var ds=DEBTS.filter(function(d){return dRem(d)>0;});
    var done=DEBTS.filter(function(d){return dRem(d)<=0;});
    if(st.role==='owner'){
      var mine=function(d){return d.lender===st.sc||d.borrower===st.sc;};
      ds=ds.filter(mine);done=done.filter(mine);
    }
    var netU={},sumU=0,sumD=0;
    ds.forEach(function(d){var r=dRem(d);
      if(d.cur==='USD'){sumD+=r;}else{sumU+=r;netU[d.lender]=(netU[d.lender]||0)+r;netU[d.borrower]=(netU[d.borrower]||0)-r;}
    });
    var h='<div class="row2" style="margin-bottom:12px">'+
      '<div class="mc"><div class="l">Jami qoldiq — so\'m</div><div class="v">'+grp(sumU)+'</div></div>'+
      '<div class="mc"><div class="l">Jami qoldiq — dollar</div><div class="v">$'+grp(sumD)+'</div></div></div>';
    h+='<div class="dq-legend"><span class="g">●</span> <b style="color:var(--gr)">oladi (haqdor)</b> — boshqalar shu loyihaga qarzdor<br>'+
       '<span class="r">●</span> <b style="color:var(--rd)">beradi (qarzdor)</b> — shu loyiha boshqalarga qarzdor</div>';
    var rows=Object.keys(netU).map(function(c){return {c:c,n:netU[c]};}).filter(function(x){return x.n!==0;}).sort(function(a,b){return b.n-a.n;});
    var uD=ds.filter(function(d){return d.cur==='UZS';});
    var hasC=!!window.Chart;
    if(rows.length){
      h+='<div class="sl">Loyihalar holati — sof qarz (so\'m)</div>';
      if(hasC){
        h+='<div class="chbox"><div class="chttl">Kim haqdor (yashil) · kim qarzdor (qizil)</div>'+
           '<div class="chwrap" style="height:'+(rows.length*40+22)+'px"><canvas id="cNet"></canvas></div></div>';
      }else{
        var max=1;rows.forEach(function(x){max=Math.max(max,Math.abs(x.n));});
        rows.forEach(function(x){
          var pos=x.n>0;var col=pos?'var(--gr)':'var(--rd)';var w=Math.max(6,Math.round(100*Math.abs(x.n)/max));
          h+='<div class="dq-stat" style="border-left-color:'+col+'"><div class="dq-stat-top">'+
            '<span class="dq-stat-name">'+esc((P_(x.c)||{}).name||x.c)+'</span>'+
            '<span class="dq-stat-net" style="color:'+col+'">'+(pos?'+':'−')+grp(Math.abs(x.n))+'</span></div>'+
            '<div class="dq-bar"><i style="width:'+w+'%;background:'+col+'"></i></div>'+
            '<div class="dq-tag" style="color:'+col+'">'+(pos?'jami OLADI — haqdor':'jami BERADI — qarzdor')+'</div></div>';
        });
      }
    }
    if(hasC&&uD.length){
      h+='<div class="sl">Qoldiq qarz tarkibi — so\'m</div>'+
         '<div class="chbox"><div class="chwrap" style="height:248px"><canvas id="cPie"></canvas>'+
         '<div class="donut-c"><div class="v">'+grp(sumU)+'</div><div class="l">qoldiq, so\'m</div></div></div></div>';
    }
    h+='<div class="sl">Faol qarzlar</div>';
    h+='<div class="dq-legend" style="margin-top:-4px"><b style="color:var(--rd)">qarzdor</b> → <b style="color:var(--goldl)">oluvchi</b> · qoldiq ko\'rsatilgan · <b>bosing</b> — tafsilot va to\'lov</div>';
    if(!ds.length)h+='<div class="muted" style="padding:14px 0;text-align:center">Faol qarz yo\'q ✓</div>';
    ds.forEach(function(d){
      var b=(P_(d.borrower)||{}).name||d.borrower,l=(P_(d.lender)||{}).name||d.lender;
      var rem=dRem(d),paid=dPaid(d),pct=Math.round(paid/d.amount*100);
      h+='<div class="debt-card" onclick="seyfDebt('+d.id+')">'+
        '<div class="debt-top"><div class="dq-pair"><span class="dq-b">'+esc(b)+'</span>'+
          '<svg class="dq-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h13M13 6l6 6-6 6"/></svg>'+
          '<span class="dq-l">'+esc(l)+'</span></div><span class="debt-rem">'+fmt(d.cur,rem)+'</span></div>'+
        '<div class="debt-pbar"><i style="width:'+pct+'%"></i></div>'+
        '<div class="debt-meta"><span>'+esc(d.note||'qarz')+' · '+esc(d.date)+'</span>'+
          '<span class="debt-paid">'+(paid>0?('to\'langan '+pct+'%'):'to\'lanmagan')+'</span></div></div>';
    });
    if(done.length){
      h+='<div class="sl">Yopilgan qarzlar</div>';
      done.forEach(function(d){
        var b=(P_(d.borrower)||{}).name||d.borrower,l=(P_(d.lender)||{}).name||d.lender;
        h+='<div class="debt-card done" onclick="seyfDebt('+d.id+')"><div class="debt-top">'+
          '<span style="color:var(--tx2);font-size:13.5px">'+esc(b)+' → '+esc(l)+'</span>'+
          '<span class="debt-done-b">✓ to\'langan · '+fmt(d.cur,d.amount)+'</span></div></div>';
      });
    }
    $('view').innerHTML=h;
    drawDebtCharts(rows,uD);
  }

  function renderDebtDetail(id){
    var d=null,i;for(i=0;i<DEBTS.length;i++)if(DEBTS[i].id===id)d=DEBTS[i];
    if(!d||(st.role==='owner'&&d.lender!==st.sc&&d.borrower!==st.sc)){seyfGo('debts');return;}
    var rem=dRem(d),paid=dPaid(d),pct=Math.round(paid/d.amount*100),done=dDone(d);
    var bN=(P_(d.borrower)||{}).name||d.borrower,lN=(P_(d.lender)||{}).name||d.lender;
    var h='<div class="dd-parties">'+
      '<div class="dd-side"><div class="nm" style="color:var(--rd)">'+esc(bN)+'</div><div class="rl" style="color:var(--rd)">qarzdor</div></div>'+
      '<svg class="dd-arrow" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h13M13 6l6 6-6 6"/></svg>'+
      '<div class="dd-side"><div class="nm" style="color:var(--goldl)">'+esc(lN)+'</div><div class="rl" style="color:var(--lblg)">oluvchi</div></div></div>';
    h+='<div class="dd-stat3">'+
      '<div class="b"><div class="l">Asl qarz</div><div class="v">'+fmt(d.cur,d.amount)+'</div></div>'+
      '<div class="b"><div class="l">To\'langan</div><div class="v" style="color:var(--gr)">'+fmt(d.cur,paid)+'</div></div>'+
      '<div class="b"><div class="l">Qoldiq</div><div class="v" style="color:'+(done?'var(--gr)':'var(--am)')+'">'+fmt(d.cur,rem)+'</div></div></div>';
    h+='<div class="debt-pbar" style="height:8px"><i style="width:'+pct+'%"></i></div>'+
       '<div style="text-align:center;font-size:12px;color:var(--tx3);margin:8px 0 4px">'+(done?'✓ To\'liq to\'langan':(pct+'% to\'langan'))+'</div>'+
       '<div style="font-size:12px;color:var(--tx3);text-align:center;margin-bottom:14px">'+esc(d.note||'')+(d.note?' · ':'')+'berilgan: '+esc(d.date)+'</div>';
    if(!done&&canWrite()){
      h+='<div class="sl">To\'lov qaytarish</div>'+
         '<div class="payform"><input id="payAmt" inputmode="decimal" placeholder="summa ('+(d.cur==='USD'?'$':'so\'m')+')" oninput="seyfGrp(this)">'+
         '<button class="paybtn" onclick="seyfPay('+d.id+')">Qaytarish</button></div>'+
         '<div style="font-size:11px;color:var(--tx3);margin-top:6px">Qisman ham bo\'ladi — qoldiqdan kamayadi va tarixga yoziladi.</div>';
    }
    h+='<div class="sl">To\'lovlar tarixi</div>';
    h+='<div class="pay-row" style="opacity:.75"><span class="pay-dot" style="background:var(--am)"></span>'+
       '<div><div>Qarz berildi</div><div class="muted" style="font-size:11px">'+esc(d.date)+'</div></div>'+
       '<span class="pay-amt" style="color:var(--am)">'+fmt(d.cur,d.amount)+'</span></div>';
    if(d.pays&&d.pays.length){
      d.pays.forEach(function(p){
        h+='<div class="pay-row"><span class="pay-dot"></span><div><div>To\'lov qaytarildi</div>'+
          '<div class="muted" style="font-size:11px">'+esc(p.date)+'</div></div>'+
          '<span class="pay-amt">−'+fmt(d.cur,p.amt)+'</span></div>';
      });
    } else {
      h+='<div class="muted" style="padding:10px 0;font-size:12.5px">Hali to\'lov yo\'q — to\'liq qarz turibdi.</div>';
    }
    $('view').innerHTML=h;
  }
  window.seyfDebt=function(id){st.curDebt=id;seyfGo('debtDetail');};
  window.seyfPay=function(id){
    var d=null,i;for(i=0;i<DEBTS.length;i++)if(DEBTS[i].id===id)d=DEBTS[i];if(!d)return;
    var amt=parseFloat((($('payAmt')||{}).value||'').replace(/ /g,''))||0;var rem=dRem(d);
    if(amt<=0)return;if(amt>rem)amt=rem;
    d.pays.push({amt:amt,date:'hozir'});
    var pb=P_(d.borrower),pl=P_(d.lender);if(pb)pb[d.cur]-=amt;if(pl)pl[d.cur]+=amt;
    OPS.unshift({type:'transfer',proj:d.borrower,counter:d.lender,cur:d.cur,amt:amt,loan:true,note:'Qarz qaytarildi',date:'hozir'});
    renderDebtDetail(id);
  };

  function drawDebtCharts(rows,uLoans){
    if(!window.Chart)return;
    try{
      Chart.defaults.color='#9AA3B8';Chart.defaults.font.family='Inter, sans-serif';
      var som=function(n){var a=Math.abs(n);if(a>=1e9)return (n/1e9).toFixed(1)+' mlrd';if(a>=1e6)return Math.round(n/1e6)+' mln';if(a>=1e3)return Math.round(n/1e3)+' ming';return ''+n;};
      var TT={backgroundColor:'#161922',borderColor:'rgba(255,255,255,.1)',borderWidth:1,padding:10,titleColor:'#F4F5F9',bodyColor:'#D6DBE6'};
      if(window._chN){window._chN.destroy();window._chN=null;}
      if(window._chP){window._chP.destroy();window._chP=null;}
      var cN=document.getElementById('cNet');
      if(cN&&rows&&rows.length){
        window._chN=new Chart(cN,{type:'bar',
          data:{labels:rows.map(function(x){return (P_(x.c)||{}).name||x.c;}),
            datasets:[{data:rows.map(function(x){return x.n;}),
              backgroundColor:rows.map(function(x){return x.n>=0?'#5BD68B':'#F2807A';}),borderRadius:5,barThickness:18}]},
          options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:false},tooltip:Object.assign({},TT,{callbacks:{label:function(c){var v=c.raw;return (v>=0?'Oladi (haqdor): +':'Beradi (qarzdor): −')+grp(Math.abs(v))+" so'm";}}})},
            scales:{x:{grid:{color:'rgba(255,255,255,.06)'},border:{display:false},ticks:{callback:function(v){return som(v);},maxTicksLimit:5}},
              y:{grid:{display:false},border:{display:false},ticks:{color:'#ECEEF3',font:{size:12}}}}}});
      }
      var cP=document.getElementById('cPie');
      if(cP&&uLoans&&uLoans.length){
        var pal=['#C9A96E','#7FB6FF','#5BD68B','#A78BFA','#EC6FA0','#E5C76B'];
        window._chP=new Chart(cP,{type:'doughnut',
          data:{labels:uLoans.map(function(d){return ((P_(d.borrower)||{}).name||d.borrower)+' → '+((P_(d.lender)||{}).name||d.lender);}),
            datasets:[{data:uLoans.map(function(d){return dRem(d);}),backgroundColor:pal,borderColor:'#0F1422',borderWidth:3,hoverOffset:6}]},
          options:{responsive:true,maintainAspectRatio:false,cutout:'66%',
            plugins:{legend:{position:'bottom',labels:{color:'#9AA3B8',boxWidth:9,font:{size:10.5},padding:8,usePointStyle:true}},
              tooltip:Object.assign({},TT,{callbacks:{label:function(c){return ' '+c.label+': '+grp(c.raw)+" so'm";}}})}}});
      }
    }catch(e){}
  }

  var AIQ=["Kim kimga qarzdor?","Bu oy Impulse qancha sarfladi?","Umumiy seyfda qancha pul bor?"];
  var AIA=[
    "Faol qarz qoldiqlari: Mfaktor club → Impulse 30 mln · Mfaktor maktab → Jalinga 30 mln (20 mln to'langan) · My Life Planner → Impulse $3 000 (qoldiq) · Jalinga → Mfaktor club 12 mln. Har birining to'lov tarixi «Qarzlar» bo'limida.",
    "Impulse bu oy 25 000 000 so'm chiqim qildi (ijara). Bu oy kirim hozircha yo'q.",
    "Jami seyfda 1 240 500 000 so'm va $86 400. Eng katta ulush — Impulse (620 mln so'm)."
  ];
  function renderAI(){
    var h='<div class="ai-wrap">'+
      '<div class="ai-orb" id="aiOrb" onclick="seyfMic()" role="button" aria-label="Tinglash">'+
        '<span class="ai-ring ring1"></span><span class="ai-ring ring2"></span><span class="ai-ring ring3"></span>'+
        '<span class="core"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></span>'+
      '</div>'+
      '<div class="ai-status" id="aiStatus">Bosing va gapiring — yoki savolni tanlang</div>'+
      '<div>'+AIQ.map(function(q,i){return '<span class="ai-chip" onclick="seyfAsk('+i+')">'+esc(q)+'</span>';}).join('')+'</div>'+
      '<div id="aiAns"></div></div>';
    $('view').innerHTML=h;
  }
  window.seyfMic=function(){
    var orb=$('aiOrb'),s=$('aiStatus');if(!orb)return;
    orb.classList.add('live');if(s)s.textContent='Tinglayapman...';
    clearTimeout(window._aiT);
    window._aiT=setTimeout(function(){orb.classList.remove('live');seyfAsk(0);},1500);
  };
  window.seyfAsk=function(i){
    var orb=$('aiOrb');if(orb)orb.classList.remove('live');
    var s=$('aiStatus');if(s)s.textContent='Bosing va gapiring — yoki savolni tanlang';
    var box=$('aiAns');if(box)box.innerHTML='<div class="ai-ans"><div class="ai-q">“'+esc(AIQ[i])+'”</div>'+esc(AIA[i])+'</div>';
  };

  window.seyfGrp=function(inp){var v=(inp.value||'').replace(/[^\d.]/g,'');var pr=v.split('.');pr[0]=pr[0].replace(/\B(?=(\d{3})+(?!\d))/g,' ');inp.value=pr.join('.');};
  function num(id){var e=$(id);if(!e)return 0;return parseFloat((e.value||'').replace(/ /g,''))||0;}
  window.seyfSave=function(){
    var t=st.newType,note=($('f_note')&&$('f_note').value||'').trim();var o={type:t,note:note,date:'hozir'};
    if(t==='income'||t==='expense'){o.proj=$('f_proj').value;o.cur=$('f_cur').value;o.amt=num('f_amt');o.cat=$('f_cat').value;
      if(o.amt<=0)return;P_(o.proj)[o.cur]+=(t==='income'?o.amt:-o.amt);}
    else if(t==='transfer'){o.proj=$('f_from').value;o.counter=$('f_to').value;o.cur=$('f_cur').value;o.amt=num('f_amt');o.loan=true;
      if(o.amt<=0||o.proj===o.counter)return;P_(o.proj)[o.cur]-=o.amt;P_(o.counter)[o.cur]+=o.amt;
      DEBTS.push({id:debtSeq++,lender:o.proj,borrower:o.counter,cur:o.cur,amount:o.amt,note:note,date:'hozir',pays:[]});}
    else if(t==='exchange'){o.proj=$('f_proj').value;o.sellCur=$('f_sc').value;o.buyCur=$('f_bc').value;o.sellAmt=num('f_sa');o.buyAmt=num('f_ba');
      if(o.sellAmt<=0||o.buyAmt<=0||o.sellCur===o.buyCur)return;var pp=P_(o.proj);pp[o.sellCur]-=o.sellAmt;pp[o.buyCur]+=o.buyAmt;}
    OPS.unshift(o);seyfGo('ops');};
  $('codeIn').addEventListener('keydown',function(e){if(e.key==='Enter')seyfLogin();});
})();
</script>
</body>
