<style>
  :root{
    --bg:#080B12;--sf:#121826;--sf2:#1A2133;--inset:#0E1320;
    --tx:#ECEEF3;--tx2:#9AA3B8;--tx3:#646C80;--lblg:#B89B6A;
    --gold:#C9A96E;--goldl:#E8D7B8;--goldd:#A0793C;
    --ln:rgba(201,169,110,.16);--ln2:rgba(201,169,110,.34);
    --info:#C9A96E;--infobg:rgba(201,169,110,.15);
    --gr:#5BD68B;--grbg:rgba(91,214,139,.13);--rd:#F2807A;--rdbg:rgba(242,128,122,.13);
    --bl:#7FB6FF;--blbg:rgba(127,182,255,.13);--am:#E5C76B;--ambg:rgba(229,199,107,.13);
    --serif:'Cormorant Garamond',Georgia,serif;--mono:'JetBrains Mono',ui-monospace,Menlo,monospace}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:
      radial-gradient(120% 50% at 50% -8%,rgba(201,169,110,.10),transparent 60%),
      var(--bg);color:var(--tx);font-family:Inter,-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
    font-size:14px;line-height:1.5;padding:16px 14px;display:flex;justify-content:center;min-height:100vh}
  #seyf{width:100%;max-width:420px;background:linear-gradient(180deg,#0F1422,#0B0F1A);
    border:1px solid var(--ln);border-radius:20px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.02) inset}
  .hd{display:flex;align-items:center;gap:10px;padding:15px 16px;border-bottom:1px solid var(--ln);
    background:linear-gradient(180deg,rgba(201,169,110,.06),transparent)}
  .hd .t{font-family:var(--serif);font-weight:600;font-size:22px;letter-spacing:.5px;color:var(--goldl)}
  .chip{font-size:11px;padding:4px 11px;border-radius:999px;background:var(--infobg);color:var(--goldl);border:1px solid var(--ln)}
  .view{padding:16px;min-height:450px}
  .nav{display:flex;border-top:1px solid var(--ln);background:rgba(0,0,0,.2)}
  .nav button{flex:1;background:none;border:0;padding:11px 4px;font-size:11px;color:var(--tx3);
    display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:inherit}
  .nav button.on{color:var(--gold)}
  .nav svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7}
  .sl{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--lblg);margin:20px 0 9px;
    display:flex;align-items:center;gap:9px}
  .sl::after{content:"";flex:1;height:1px;background:var(--ln)}
  .mc{background:var(--sf2);border:1px solid var(--ln);border-radius:14px;padding:13px 14px;position:relative;overflow:hidden}
  .mc::before{content:"";position:absolute;left:0;top:0;height:2px;width:100%;background:linear-gradient(90deg,var(--goldd),var(--gold),transparent)}
  .mc .l{font-size:11.5px;color:var(--tx2);letter-spacing:.3px}
  .mc .v{font-family:var(--mono);font-weight:600;font-size:20px;margin-top:7px;color:var(--goldl);
    letter-spacing:-.3px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .pc{display:flex;align-items:center;gap:11px;padding:13px;border:1px solid var(--ln);border-radius:13px;
    margin-bottom:9px;cursor:pointer;background:linear-gradient(180deg,rgba(255,255,255,.015),transparent)}
  .pc:active{border-color:var(--ln2)}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 9px 0 currentColor}
  .lg{width:42px;height:42px;border-radius:12px;flex:0 0 auto;background:#fff;border:1px solid var(--ln2);
    display:flex;align-items:center;justify-content:center;overflow:hidden}
  .lg img{width:100%;height:100%;object-fit:contain;padding:4px}
  .lgd{width:42px;height:42px;border-radius:12px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    border:1px solid var(--ln);background:var(--inset)}
  .lgd .d{width:14px;height:14px;border-radius:50%}
  .pgrid{display:grid;gap:11px;margin-bottom:4px}
  .pcard{border:1px solid var(--ln);border-radius:16px;padding:15px 14px;cursor:pointer;position:relative;overflow:hidden;
    background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,0))}
  .pcard::before{content:"";position:absolute;left:0;top:0;height:100%;width:3px;background:var(--pcol,var(--gold));opacity:.85}
  .pcard:active{border-color:var(--ln2)}
  .pcard .lgb{width:56px;height:56px;border-radius:14px;background:#fff;border:1px solid var(--ln2);
    display:flex;align-items:center;justify-content:center;overflow:hidden}
  .pcard .lgb img{width:100%;height:100%;object-fit:contain;padding:6px}
  .pcard .lgbd{width:56px;height:56px;border-radius:14px;border:1px solid var(--ln);background:var(--inset);display:flex;align-items:center;justify-content:center}
  .pcard .nm{font-weight:500;font-size:14.5px;margin-top:12px}
  .pcard .b1{font-family:var(--mono);font-weight:600;font-size:14px;color:var(--goldl);margin-top:10px;
    font-variant-numeric:tabular-nums;letter-spacing:-.2px;white-space:nowrap}
  .pcard .b2{font-family:var(--mono);font-size:12px;color:var(--tx3);margin-top:3px}
  .pc .nm{font-weight:500}
  .pc .bal{margin-left:auto;text-align:right;font-family:var(--mono);font-size:12px;color:var(--tx)}
  .op{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--ln)}
  .bdg{font-size:10.5px;padding:3px 9px;border-radius:7px;white-space:nowrap;font-weight:600;letter-spacing:.2px;border:1px solid transparent}
  .amt{margin-left:auto;font-family:var(--mono);font-weight:600;white-space:nowrap;font-size:13px}
  .seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:15px}
  .seg button{padding:13px;border:1px solid var(--ln);background:var(--inset);border-radius:12px;font-weight:500;
    font-size:13px;cursor:pointer;color:var(--tx2);font-family:inherit}
  .seg button.on{border-color:var(--gold);background:var(--infobg);color:var(--goldl)}
  label.fl{display:block;font-size:11.5px;color:var(--tx2);letter-spacing:.3px;margin:13px 0 6px}
  input,select{width:100%;padding:12px 13px;border:1px solid var(--ln2);border-radius:12px;font-size:16px;
    font-family:inherit;background:var(--inset);color:var(--tx)}
  input:focus,select:focus{outline:0;border-color:var(--gold)}
  input::placeholder{color:var(--tx3)}
  .pbtn{width:100%;padding:14px;border:0;border-radius:12px;
    background:linear-gradient(180deg,#E2C684,#C9A96E);color:#241803;font-size:15px;font-weight:600;
    letter-spacing:.3px;cursor:pointer;font-family:inherit;margin-top:18px;box-shadow:0 8px 22px rgba(201,169,110,.22)}
  .gbtn{padding:7px 11px;border:1px solid var(--ln2);background:var(--inset);border-radius:10px;font-size:17px;
    cursor:pointer;font-family:inherit;color:var(--goldl);line-height:1}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .led{display:flex;align-items:center;gap:9px;padding:11px 0;border-bottom:1px solid var(--ln);font-size:13px}
  .led .rb{margin-left:auto;font-family:var(--mono);text-align:right}
  .bi{background:var(--grbg);color:var(--gr);border-color:rgba(91,214,139,.25)}
  .be{background:var(--rdbg);color:var(--rd);border-color:rgba(242,128,122,.25)}
  .bx{background:var(--blbg);color:var(--bl);border-color:rgba(127,182,255,.25)}
  .bt{background:var(--ambg);color:var(--am);border-color:rgba(229,199,107,.25)}
  .muted{color:var(--tx3)} .gr{color:var(--gr)} .rd{color:var(--rd)} .am{color:var(--am)}
</style>
</head>

<style>
/* ===== SEYF — Vault Door Login (brushed-steel safe) ===== */
.vlt-wrap{--vs1:#2a2f38;--vs2:#3a414d;--vs3:#1c2027;--vg:#C9A96E;--vgl:#E8D7B8;--vgd:#A0793C;--vtx:#ECEEF3;--vtx2:#9AA3B8;--vtx3:#646C80;position:relative;width:100%;box-sizing:border-box;padding:14px 0 8px;font-family:'Inter',system-ui,sans-serif;color:var(--vtx);-webkit-tap-highlight-color:transparent}
.vlt-wrap *,.vlt-wrap *::before,.vlt-wrap *::after{box-sizing:border-box}
.vlt-frame{position:relative;border-radius:24px;padding:12px;background:linear-gradient(135deg,#11151c,#070a0f 60%,#0d1117);box-shadow:inset 0 2px 3px rgba(255,255,255,.05),inset 0 -3px 8px rgba(0,0,0,.8),0 24px 60px rgba(0,0,0,.7)}
.vlt-hinge{position:absolute;left:-3px;width:10px;height:32px;border-radius:5px;background:linear-gradient(90deg,#0c0f14,#454d5b 35%,#7b8699 50%,#3a414d 70%,#0c0f14);box-shadow:0 2px 5px rgba(0,0,0,.7),inset 0 1px 1px rgba(255,255,255,.25);z-index:5}
.vlt-hinge.h1{top:46px}.vlt-hinge.h2{top:50%;transform:translateY(-50%)}.vlt-hinge.h3{bottom:46px}
.vlt-hinge::after{content:"";position:absolute;inset:5px 3px;border-radius:3px;background:radial-gradient(circle at 40% 30%,#aeb7c7,#1a1e26)}
.vlt-door{position:relative;overflow:hidden;border-radius:17px;padding:24px 18px 26px;background:repeating-linear-gradient(92deg,rgba(255,255,255,.018) 0 1px,rgba(0,0,0,.02) 1px 2px),radial-gradient(120% 80% at 50% 6%,rgba(255,255,255,.10),rgba(255,255,255,0) 55%),conic-gradient(from 210deg at 50% 42%,#343b46,#272d36 18%,#3c434f 34%,#232830 52%,#3a414d 70%,#262c35 86%,#343b46);box-shadow:inset 0 0 0 1px rgba(255,255,255,.05),inset 0 2px 4px rgba(255,255,255,.10),inset 0 -10px 24px rgba(0,0,0,.6),inset 0 0 60px rgba(0,0,0,.45)}
.vlt-door::before{content:"";position:absolute;top:-60%;left:-45%;width:55%;height:220%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.13) 45%,rgba(255,255,255,.20) 50%,transparent 60%);transform:rotate(8deg);pointer-events:none;animation:vltSheen 2.4s ease-out .3s 1 both}
@keyframes vltSheen{from{left:-50%}to{left:135%}}
.vlt-rivet{position:absolute;width:11px;height:11px;border-radius:50%;z-index:4;background:radial-gradient(circle at 36% 30%,#cfd6e2,#8b94a5 38%,#3b414c 70%,#14171d);box-shadow:0 1px 2px rgba(0,0,0,.7),inset 0 -1px 1px rgba(0,0,0,.5),inset 0 1px 1px rgba(255,255,255,.45)}
.vlt-rivet.tl{top:11px;left:11px}.vlt-rivet.tr{top:11px;right:11px}.vlt-rivet.bl{bottom:11px;left:11px}.vlt-rivet.br{bottom:11px;right:11px}.vlt-rivet.ml{top:50%;left:9px;transform:translateY(-50%)}.vlt-rivet.mr{top:50%;right:9px;transform:translateY(-50%)}
.vlt-plate{position:relative;text-align:center;margin:2px auto 18px;padding:12px 26px 11px;max-width:280px;border-radius:11px;background:linear-gradient(180deg,#454c58,#2a3039 55%,#373e49);box-shadow:inset 0 1px 1px rgba(255,255,255,.22),inset 0 -2px 4px rgba(0,0,0,.55),0 3px 8px rgba(0,0,0,.5)}
.vlt-plate::before,.vlt-plate::after{content:"";position:absolute;top:50%;width:7px;height:7px;border-radius:50%;transform:translateY(-50%);background:radial-gradient(circle at 40% 35%,#d8dee9,#7b8497 45%,#2a2f38);box-shadow:inset 0 0 1px rgba(0,0,0,.6)}
.vlt-plate::before{left:9px}.vlt-plate::after{right:9px}
.vlt-brand{font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;font-size:46px;line-height:.9;letter-spacing:.07em;background:linear-gradient(180deg,#fff6e3,var(--vgl) 30%,var(--vg) 60%,var(--vgd));-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 1px 0 rgba(255,255,255,.18)) drop-shadow(0 2px 2px rgba(0,0,0,.55))}
.vlt-sub{margin-top:3px;font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--vtx2);text-shadow:0 1px 0 rgba(0,0,0,.6)}
.vlt-dialwrap{display:flex;justify-content:center;margin:2px 0 20px}
.vlt-dial{position:relative;width:138px;height:138px;border-radius:50%;background:conic-gradient(from 0deg,#3f4654,#23272f 12%,#454d5c 25%,#262b33 50%,#454d5c 75%,#23272f 88%,#3f4654),radial-gradient(circle at 50% 38%,rgba(255,255,255,.12),rgba(0,0,0,0) 60%);box-shadow:inset 0 2px 3px rgba(255,255,255,.18),inset 0 -6px 14px rgba(0,0,0,.65),0 8px 18px rgba(0,0,0,.55),0 0 0 1px rgba(0,0,0,.5)}
.vlt-dial svg{position:absolute;inset:0;width:100%;height:100%}
.vlt-recess{position:absolute;inset:24px;border-radius:50%;background:radial-gradient(circle at 50% 40%,#1c1f27,#0c0f15 70%);box-shadow:inset 0 2px 6px rgba(0,0,0,.85),inset 0 -1px 0 rgba(255,255,255,.05)}
.vlt-hub{position:absolute;top:50%;left:50%;width:54px;height:54px;border-radius:50%;transform:translate(-50%,-50%);z-index:2;background:radial-gradient(circle at 40% 30%,#f6e7c4,#d9b878 30%,var(--vg) 50%,var(--vgd) 80%,#7a5a2c);box-shadow:inset 0 2px 3px rgba(255,255,255,.6),inset 0 -3px 6px rgba(74,52,22,.8),0 0 0 1px rgba(0,0,0,.45),0 4px 12px -4px rgba(0,0,0,.7)}
.vlt-hub::after{content:"";position:absolute;top:50%;left:50%;width:2px;height:34%;background:linear-gradient(rgba(74,52,22,.7),transparent);transform:translate(-50%,-100%);border-radius:2px}
.vlt-idx{position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:0;height:0;z-index:4;border-left:5px solid transparent;border-right:5px solid transparent;border-top:9px solid var(--vg);filter:drop-shadow(0 1px 1px rgba(0,0,0,.6))}
.vlt-field{position:relative;margin:0 auto 4px;max-width:284px}
.vlt-label{display:block;text-align:center;font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--vtx3);margin-bottom:8px;text-shadow:0 1px 0 rgba(0,0,0,.5)}
.vlt-slot{position:relative;border-radius:12px;background:linear-gradient(180deg,#0a0d13,#0f131a);box-shadow:inset 0 3px 7px rgba(0,0,0,.9),inset 0 -1px 1px rgba(255,255,255,.06),inset 0 0 0 1px rgba(0,0,0,.7),0 1px 0 rgba(255,255,255,.05);transition:box-shadow .3s ease}
.vlt-slot input{width:100%;border:0;outline:0;background:transparent;color:var(--vgl);font-family:'JetBrains Mono',ui-monospace,monospace;font-size:24px;font-weight:600;letter-spacing:.42em;text-indent:.42em;text-align:center;padding:15px 12px;caret-color:var(--vg);text-shadow:0 1px 2px rgba(0,0,0,.8),0 0 10px rgba(201,169,110,.18)}
.vlt-slot input::placeholder{color:#3a4150;letter-spacing:.42em;font-weight:500;text-shadow:none}
.vlt-slot:focus-within{box-shadow:inset 0 3px 7px rgba(0,0,0,.85),inset 0 0 0 1px rgba(201,169,110,.5),0 0 0 3px rgba(201,169,110,.16),0 0 22px -2px rgba(201,169,110,.4)}
#loginErr{min-height:16px;text-align:center;margin:10px auto 2px;max-width:284px;font-size:12.5px;font-weight:600;letter-spacing:.02em;color:#ff8c84;text-shadow:0 1px 2px rgba(0,0,0,.7)}
#loginErr:not(:empty){padding:6px 10px;border-radius:8px;background:linear-gradient(180deg,rgba(120,30,30,.35),rgba(60,12,12,.25));box-shadow:inset 0 1px 1px rgba(255,255,255,.06),inset 0 -2px 5px rgba(0,0,0,.5)}
.vlt-handlewrap{display:flex;flex-direction:column;align-items:center;margin:16px 0 6px}
.vlt-handle{position:relative;width:100px;height:100px;border-radius:50%;cursor:pointer;border:0;padding:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 38% 28%,#f8ecce,#e2c389 22%,var(--vg) 46%,var(--vgd) 74%,#74541f);box-shadow:inset 0 3px 4px rgba(255,255,255,.6),inset 0 -6px 12px rgba(64,44,16,.85),0 0 0 1px rgba(0,0,0,.5),0 0 0 7px rgba(201,169,110,.08),0 0 0 8px rgba(0,0,0,.4),0 12px 26px -8px rgba(0,0,0,.8),0 0 26px -6px rgba(201,169,110,.3);transition:transform .12s ease,box-shadow .25s ease,filter .25s ease}
.vlt-handle:hover{filter:brightness(1.05);box-shadow:inset 0 3px 4px rgba(255,255,255,.65),inset 0 -6px 12px rgba(64,44,16,.85),0 0 0 1px rgba(0,0,0,.5),0 0 0 7px rgba(201,169,110,.16),0 0 0 8px rgba(0,0,0,.4),0 12px 26px -8px rgba(0,0,0,.8),0 0 34px -4px rgba(201,169,110,.55)}
.vlt-handle:active{transform:scale(.95) rotate(8deg)}
.vlt-handle:focus-visible{outline:2px solid var(--vgl);outline-offset:5px}
.vlt-spokes{position:absolute;inset:0;z-index:1;pointer-events:none}
.vlt-cap{position:relative;z-index:2;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 40% 32%,#fbf0d4,#d9b878 40%,#b08c4e 72%,#856330);box-shadow:inset 0 2px 2px rgba(255,255,255,.7),inset 0 -2px 4px rgba(74,52,22,.7),0 1px 2px rgba(0,0,0,.5)}
.vlt-handle-lbl{margin-top:12px;font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;letter-spacing:.32em;text-transform:uppercase;background:linear-gradient(180deg,var(--vgl),var(--vg) 55%,var(--vgd));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 1px 0 rgba(0,0,0,.4);padding-left:.32em}
.vlt-demo{margin:14px auto 4px;max-width:330px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:10.5px;line-height:1.7;color:var(--vtx3);letter-spacing:.01em;text-shadow:0 1px 0 rgba(0,0,0,.55)}
.vlt-demo .t{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--vg);font-weight:700;margin-bottom:5px}
.vlt-demo b{color:var(--vgl);font-weight:600}
.vlt-demo .sep{color:#3a414d;padding:0 2px}
@media (max-width:360px){.vlt-brand{font-size:40px}.vlt-dial{width:124px;height:124px}.vlt-handle{width:92px;height:92px}.vlt-slot input{font-size:21px}}
@media (prefers-reduced-motion:reduce){.vlt-door::before{display:none;animation:none}.vlt-handle,.vlt-slot,.vlt-dial{transition:none}}
</style>

              <line x1="50" y1="8" x2="50" y2="22"/><line x1="50" y1="92" x2="50" y2="78"/><line x1="8" y1="50" x2="22" y2="50"/><line x1="92" y1="50" x2="78" y2="50"/>
              <line x1="20" y1="20" x2="30" y2="30"/><line x1="80" y1="20" x2="70" y2="30"/><line x1="20" y1="80" x2="30" y2="70"/><line x1="80" y1="80" x2="70" y2="70"/>
            </g>
          </svg>
          <span class="vlt-cap">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 10V7.5a5 5 0 0 1 10 0V10" stroke="#5a4220" stroke-width="2" stroke-linecap="round"/>
              <rect x="4.5" y="10" width="15" height="10.5" rx="2.4" fill="#3c2c12"/>
              <circle cx="12" cy="15" r="1.7" fill="#e8d7b8"/>
              <rect x="11.1" y="15.4" width="1.8" height="3.4" rx=".9" fill="#e8d7b8"/>
            </svg>
          </span>
        </button>
        <div class="vlt-handle-lbl">Kirish</div>
      </div>
      <div class="vlt-demo">
        <div class="t">Demo kodlar</div>
        <b>1234</b> direktor <span class="sep">·</span> <b>1111</b> kassir<br>
        <b>2001</b> Jo'rabek (Jalinga) <span class="sep">·</span> <b>2003</b> Ulug'bek
      </div>
    </div>
  </div>
</div>
  </div>
  <div id="appScr" style="display:none">
    <div class="hd">
      <button id="backBtn" class="gbtn" style="display:none" onclick="seyfBack()">&lsaquo;</button>
      <span class="t" id="hdTitle">Seyf</span>
      <span class="chip" id="roleChip" style="margin-left:auto"></span>
    </div>
    <div class="view" id="view"></div>
    <div class="nav">
      <button id="nav-dash" onclick="seyfGo('dash')"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Panel</button>
      <button id="nav-ops" onclick="seyfGo('ops')"><svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>Amallar</button>
      <button id="nav-new" onclick="seyfGo('new')"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Yangi</button>
    </div>
  </div>
</div>
<script>
(function(){
  var P=[
    {code:'impulse',name:'Impulse',color:'#D9A441',logo:'seyf-logos/impulse.jpg',UZS:620000000,USD:31500},
    {code:'jalinga',name:'Jalinga',color:'#43C99B',logo:'seyf-logos/jalinga.jpg',UZS:214000000,USD:28900},
    {code:'mfaktor_school',name:'Mfaktor maktab',color:'#5EA0F0',logo:'seyf-logos/mfaktor_school.jpg',UZS:268500000,USD:14000},
    {code:'mfaktor_club',name:'Mfaktor club',color:'#A78BFA',logo:'seyf-logos/mfaktor_club.png',UZS:98000000,USD:7200},
    {code:'mlp',name:'My Life Planner',color:'#EC6FA0',logo:'',UZS:40000000,USD:4800}
  ];
  var OPS=[
    {type:'income',proj:'mfaktor_school',cur:'UZS',amt:18000000,cat:"Mijoz to'lovi",note:'Trening to\'lovi',date:'bugun 14:20'},
    {type:'expense',proj:'impulse',cur:'UZS',amt:25000000,cat:'Ijara',note:'Iyun ijara',date:'bugun 12:05'},
    {type:'transfer',proj:'impulse',counter:'mfaktor_club',cur:'UZS',amt:30000000,loan:true,note:'',date:'bugun 09:48'}
  ];
  var ROLES={'1234':{role:'director'},'1111':{role:'cashier'},
    '2001':{role:'owner',sc:'jalinga'},'2002':{role:'owner',sc:'mfaktor_school'},
    '2003':{role:'owner',sc:'mfaktor_club'},'2004':{role:'owner',sc:'mlp'}};
  var ROLE_UZ={director:'Direktor',cashier:'Kassir',owner:'Loyiha egasi'};
  var BCLS={income:'bi',expense:'be',exchange:'bx',transfer:'bt'};
  var LAB={income:'Kirim',expense:'Chiqim',exchange:'Ayirboshlash',transfer:"O'tkazma"};
  var st={role:null,sc:null,view:'dash',curProj:null,newType:'income'};
  var $=function(id){return document.getElementById(id);};
  function grp(n){n=Math.round(n);var s=Math.abs(n).toLocaleString('en-US').replace(/,/g,' ');return (n<0?'−':'')+s;}
  function fmt(cur,n){return cur==='USD'?('$'+grp(n)):(grp(n)+" so'm");}
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function P_(c){for(var i=0;i<P.length;i++)if(P[i].code===c)return P[i];return null;}
  function visible(){return st.role==='owner'?P.filter(function(p){return p.code===st.sc;}):P.slice();}
  function canWrite(){return st.role==='director'||st.role==='cashier';}
  function opVisible(o){if(st.role!=='owner')return true;return o.proj===st.sc||o.counter===st.sc;}
  window.seyfLogin=function(){
    var c=($('codeIn').value||'').trim();var r=ROLES[c];
    if(!r){$('loginErr').textContent='Kod noto\'g\'ri';return;}
    st.role=r.role;st.sc=r.sc||null;st.view='dash';
    $('loginScr').style.display='none';$('appScr').style.display='block';
    $('roleChip').textContent=ROLE_UZ[st.role];
    $('nav-new').style.display=canWrite()?'flex':'none';seyfGo('dash');};
  window.seyfGo=function(v){st.view=v;render();};
  window.seyfBack=function(){seyfGo('dash');};
  function setNav(){['dash','ops','new'].forEach(function(v){var b=$('nav-'+v);if(b)b.classList.toggle('on',st.view===v);});}
  function render(){
    var v=st.view;$('backBtn').style.display=(v==='project'||v==='new')?'block':'none';
    $('hdTitle').textContent={dash:'Panel',ops:'Amallar',new:'Yangi amal',project:(P_(st.curProj)||{}).name||'Loyiha'}[v]||'Seyf';
    setNav();
    if(v==='dash')renderDash();else if(v==='ops')renderOps();else if(v==='new')renderNew();else if(v==='project')renderProject();}
  function renderDash(){
    var vis=visible();var tu=0,td=0;vis.forEach(function(p){tu+=p.UZS;td+=p.USD;});
    var h='<div class="row2" style="margin-bottom:6px"><div class="mc"><div class="l">Jami — so\'m</div><div class="v">'+grp(tu)+'</div></div>'+
      '<div class="mc"><div class="l">Jami — dollar</div><div class="v">$'+grp(td)+'</div></div></div>';
    h+='<div class="sl">Loyihalar</div>';
    var cols=vis.length===1?'1fr':'1fr 1fr';
    h+='<div class="pgrid" style="grid-template-columns:'+cols+'">';
    vis.forEach(function(p){
      var chip=p.logo?('<span class="lgb"><img src="'+p.logo+'" alt=""></span>')
        :('<span class="lgbd"><span class="d" style="width:18px;height:18px;border-radius:50%;background:'+p.color+';box-shadow:0 0 11px '+p.color+'"></span></span>');
      h+='<div class="pcard" style="--pcol:'+p.color+'" onclick="seyfProj(\''+p.code+'\')">'+chip+
        '<div class="nm">'+esc(p.name)+'</div><div class="b1">'+grp(p.UZS)+'</div><div class="b2">$'+grp(p.USD)+'</div></div>';});
    h+='</div>';
    if(canWrite())h+='<button class="pbtn" onclick="seyfGo(\'new\')" style="margin-top:8px">+ Yangi amal</button>';
    h+='<div class="sl">So\'nggi amallar</div>';
    var rec=OPS.filter(opVisible).slice(0,8);
    if(!rec.length)h+='<div class="muted" style="padding:14px 0">Amal yo\'q</div>';
    rec.forEach(function(o){h+=opRow(o);});$('view').innerHTML=h;}
  function opRow(o){
    var sign=o.type==='income'?'+':(o.type==='expense'?'−':'');
    var amtTxt=o.type==='exchange'?('−'+fmt(o.sellCur,o.sellAmt)+' → +'+fmt(o.buyCur,o.buyAmt)):(sign+fmt(o.cur,o.amt));
    var sub=(P_(o.proj)||{}).name||'';if(o.counter)sub+=' → '+((P_(o.counter)||{}).name||'');if(o.cat)sub+=' · '+o.cat;
    var cl=o.type==='income'?'gr':(o.type==='expense'?'rd':'');
    return '<div class="op"><span class="bdg '+BCLS[o.type]+'">'+LAB[o.type]+'</span>'+
      '<div style="min-width:0"><div>'+esc(o.note||o.cat||sub)+(o.loan?' <span class="am" style="font-size:10px">qarz</span>':'')+'</div>'+
      '<div style="font-size:11.5px" class="muted">'+esc(sub)+' · '+esc(o.date)+'</div></div>'+
      '<span class="amt '+cl+'">'+amtTxt+'</span></div>';}
  function renderOps(){
    var h='<div style="display:flex;gap:7px;margin-bottom:14px">';
    ['Kunlik','Haftalik','Oylik','Choraklik'].forEach(function(x,i){h+='<span style="font-size:11.5px;padding:6px 11px;border-radius:9px;border:1px solid var(--ln2);'+
      (i===2?'background:var(--infobg);color:var(--goldl)':'color:var(--tx2)')+'">'+x+'</span>';});h+='</div>';
    var list=OPS.filter(opVisible);if(!list.length)h+='<div class="muted" style="padding:20px 0;text-align:center">Amal yo\'q</div>';
    list.forEach(function(o){h+=opRow(o);});$('view').innerHTML=h;}
  function renderProject(){
    var p=P_(st.curProj);if(!p){seyfGo('dash');return;}
    var pchip=p.logo?('<span class="lg"><img src="'+p.logo+'" alt=""></span>')
      :('<span class="lgd"><span class="d" style="background:'+p.color+';box-shadow:0 0 9px '+p.color+'"></span></span>');
    var h='<div style="display:flex;align-items:center;gap:11px;margin-bottom:14px">'+pchip+
      '<span style="font-family:var(--serif);font-size:21px;color:var(--goldl)">'+esc(p.name)+'</span></div>';
    h+='<div class="row2" style="margin-bottom:4px"><div class="mc"><div class="l">so\'m</div><div class="v">'+grp(p.UZS)+'</div></div>'+
      '<div class="mc"><div class="l">dollar</div><div class="v">$'+grp(p.USD)+'</div></div></div>';
    ['UZS','USD'].forEach(function(cur){
      h+='<div class="sl">'+(cur==='UZS'?'So\'m':'Dollar')+' daftari</div>';
      var run=p[cur];var rows=OPS.filter(function(o){return opTouches(o,p.code,cur);});
      if(!rows.length){h+='<div class="muted" style="padding:6px 0;font-size:13px">Yozuv yo\'q</div>';return;}
      rows.forEach(function(o){var d=delta(o,p.code,cur);
        h+='<div class="led"><span>'+LAB[o.type]+'</span><span class="muted" style="font-size:12px">'+esc(o.note||o.cat||'')+'</span>'+
          '<span class="rb"><span class="'+(d>=0?'gr':'rd')+'">'+(d>=0?'+':'−')+fmt(cur,Math.abs(d))+'</span>'+
          '<br><span class="muted" style="font-size:12px">'+fmt(cur,run)+'</span></span></div>';run-=d;});});
    $('view').innerHTML=h;}
  function opTouches(o,code,cur){
    if(o.type==='exchange')return o.proj===code&&(o.sellCur===cur||o.buyCur===cur);
    if(o.type==='transfer')return o.cur===cur&&(o.proj===code||o.counter===code);
    return o.proj===code&&o.cur===cur;}
  function delta(o,code,cur){
    if(o.type==='income')return o.amt;if(o.type==='expense')return -o.amt;
    if(o.type==='transfer')return o.proj===code?-o.amt:o.amt;
    if(o.type==='exchange')return o.sellCur===cur?-o.sellAmt:o.buyAmt;return 0;}
  window.seyfProj=function(c){st.curProj=c;seyfGo('project');};
  window.seyfType=function(t){st.newType=t;renderNew();};
  function projOpts(sel){return P.map(function(p){return '<option value="'+p.code+'"'+(p.code===sel?' selected':'')+'>'+esc(p.name)+'</option>';}).join('');}
  function curOpts(sel){return ['UZS','USD'].map(function(c){return '<option value="'+c+'"'+(c===sel?' selected':'')+'>'+(c==='UZS'?'so\'m':'dollar')+'</option>';}).join('');}
  function renderNew(){
    var t=st.newType;var h='<div class="seg">';
    ['income','expense','exchange','transfer'].forEach(function(x){h+='<button class="'+(x===t?'on':'')+'" onclick="seyfType(\''+x+'\')">'+LAB[x]+'</button>';});h+='</div>';
    if(t==='transfer'){h+='<label class="fl">Qaysi loyihadan</label><select id="f_from">'+projOpts('impulse')+'</select>';
      h+='<label class="fl">Qaysi loyihaga</label><select id="f_to">'+projOpts('mfaktor_club')+'</select>';}
    else{h+='<label class="fl">Loyiha</label><select id="f_proj">'+projOpts('impulse')+'</select>';}
    if(t==='exchange'){
      h+='<div class="row2"><div><label class="fl">Sotiladi</label><select id="f_sc">'+curOpts('USD')+'</select></div>'+
         '<div><label class="fl">Miqdor</label><input id="f_sa" inputmode="decimal" placeholder="0" oninput="seyfGrp(this)"></div></div>';
      h+='<div class="row2"><div><label class="fl">Olinadi</label><select id="f_bc">'+curOpts('UZS')+'</select></div>'+
         '<div><label class="fl">Miqdor</label><input id="f_ba" inputmode="decimal" placeholder="0" oninput="seyfGrp(this)"></div></div>';}
    else{h+='<label class="fl">Valyuta</label><select id="f_cur">'+curOpts('UZS')+'</select>';
      h+='<label class="fl">Summa</label><input id="f_amt" inputmode="decimal" placeholder="0" oninput="seyfGrp(this)">';}
    if(t==='income'||t==='expense'){var cats=t==='income'?["Mijoz to'lovi","Avans","Ijara tushumi","Boshqa kirim"]:["Oylik / ish haqi","Ijara","Marketing","Ta'minot / xarid","Boshqa chiqim"];
      h+='<label class="fl">Modda</label><select id="f_cat">'+cats.map(function(c){return '<option>'+esc(c)+'</option>';}).join('')+'</select>';}
    if(t==='transfer')h+='<label class="fl" style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="f_loan" style="width:auto"> Qarz sifatida</label>';
    h+='<label class="fl">Izoh</label><input id="f_note" placeholder="ixtiyoriy">';
    h+='<button class="pbtn" onclick="seyfSave()">Saqlash — '+LAB[t]+'</button>';$('view').innerHTML=h;}
  window.seyfGrp=function(inp){var v=(inp.value||'').replace(/[^\d.]/g,'');var pr=v.split('.');pr[0]=pr[0].replace(/\B(?=(\d{3})+(?!\d))/g,' ');inp.value=pr.join('.');};
  function num(id){var e=$(id);if(!e)return 0;return parseFloat((e.value||'').replace(/ /g,''))||0;}
  window.seyfSave=function(){
    var t=st.newType,note=($('f_note')&&$('f_note').value||'').trim();var o={type:t,note:note,date:'hozir'};
    if(t==='income'||t==='expense'){o.proj=$('f_proj').value;o.cur=$('f_cur').value;o.amt=num('f_amt');o.cat=$('f_cat').value;
      if(o.amt<=0)return;P_(o.proj)[o.cur]+=(t==='income'?o.amt:-o.amt);}
    else if(t==='transfer'){o.proj=$('f_from').value;o.counter=$('f_to').value;o.cur=$('f_cur').value;o.amt=num('f_amt');o.loan=$('f_loan').checked;
      if(o.amt<=0||o.proj===o.counter)return;P_(o.proj)[o.cur]-=o.amt;P_(o.counter)[o.cur]+=o.amt;}
    else if(t==='exchange'){o.proj=$('f_proj').value;o.sellCur=$('f_sc').value;o.buyCur=$('f_bc').value;o.sellAmt=num('f_sa');o.buyAmt=num('f_ba');
      if(o.sellAmt<=0||o.buyAmt<=0||o.sellCur===o.buyCur)return;var pp=P_(o.proj);pp[o.sellCur]-=o.sellAmt;pp[o.buyCur]+=o.buyAmt;}
    OPS.unshift(o);seyfGo('ops');};
  $('codeIn').addEventListener('keydown',function(e){if(e.key==='Enter')seyfLogin();});
})();
</script>
